services:
  portfolio-dev:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${PORT:-4321}:4321"
    environment:
      ASTRO_TELEMETRY_DISABLED: "${ASTRO_TELEMETRY_DISABLED:-1}"
    volumes:
      - .:/app
      - portfolio-node-modules:/app/node_modules

volumes:
  portfolio-node-modules:
